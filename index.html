<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tijgerbol - Бонусная программа</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: url('Giraffe%20illustration.jpeg') center/cover fixed; min-height: 100vh; color: #1A1A1A; }
    .overlay { background: rgba(0, 0, 0, 0.55); min-height: 100vh; padding: 20px 0 40px; }
    .container { max-width: 500px; margin: 0 auto; padding: 0 16px; }
    .tabs { display: flex; background: #1A1A1A; margin: 0 16px 20px; border-radius: 60px; overflow: hidden; }
    .tab { flex: 1; text-align: center; padding: 14px 0; font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.55); cursor: pointer; background: #1A1A1A; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab i { font-size: 16px; }
    .tab.active { background: #B8860B; color: white; }
    .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.04); }
    .balance-card { background: linear-gradient(135deg, #1A1A1A, #2D2D2D); color: white; text-align: center; border: none; }
    .balance-amount { font-size: 64px; font-weight: 700; letter-spacing: -2px; margin: 8px 0; }
    .balance-label { font-size: 13px; opacity: 0.6; text-transform: uppercase; }
    .balance-sub { font-size: 12px; opacity: 0.5; margin-top: 8px; }
    .avatar-large { width: 88px; height: 88px; background: #F5F5F5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 44px; margin: 0 auto 12px; overflow: hidden; border: 2px solid #B8860B; }
    .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
    button { background: #B8860B; color: white; border: none; padding: 14px 20px; border-radius: 60px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
    button:active { transform: scale(0.97); background: #9A7209; }
    .btn-secondary { background: #F0F0F0; color: #1A1A1A; }
    .btn-outline { background: transparent; border: 1.5px solid #B8860B; color: #B8860B; }
    .row { display: flex; gap: 12px; margin-top: 12px; }
    .row button { flex: 1; }
    .phone-input-group { display: flex; gap: 10px; align-items: center; }
    .country-select { width: 100px; padding: 14px 10px; border: 1.5px solid #E8E8E8; border-radius: 60px; font-family: inherit; background: white; }
    .phone-number { flex: 1; padding: 14px 18px; border: 1.5px solid #E8E8E8; border-radius: 60px; font-size: 16px; font-family: inherit; background: white; }
    input:focus, select:focus { outline: none; border-color: #B8860B; }
    .history-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid #F0F0F0; }
    .history-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .history-icon.add { background: #E8F5E9; color: #2E7D32; }
    .history-icon.remove { background: #FFEBEE; color: #D32F2F; }
    .history-icon.none { background: #FFF3E0; color: #B8860B; }
    .history-text { flex: 1; font-size: 14px; font-weight: 500; }
    .history-date { font-size: 11px; color: #999; margin-top: 4px; }
    .avatar-selector { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 16px 0; }
    .avatar-option { width: 48px; height: 48px; background: #F5F5F5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 2px solid transparent; }
    .avatar-option.selected { border-color: #B8860B; background: #FFF8F0; transform: scale(1.05); }
    .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F0F0F0; }
    .hidden { display: none; }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; }
    .text-muted { color: #888; font-size: 13px; }
    .promo-badge { background: #B8860B; color: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; font-weight: 600; display: inline-block; }
    .qr-container { text-align: center; padding: 16px; background: #FAFAFA; border-radius: 20px; }
    .qr-code { width: 160px; height: 160px; margin: 0 auto; background: white; display: flex; align-items: center; justify-content: center; flex-direction: column; border-radius: 16px; }
    .loading { text-align: center; padding: 40px; color: white; }
  </style>
</head>
<body>
<div class="overlay">
  <div class="tabs" id="tabs" style="display: none;">
    <div class="tab active" onclick="switchTab(0)"><i class="fas fa-coffee"></i> Кофе</div>
    <div class="tab" onclick="switchTab(1)"><i class="fas fa-user"></i> Профиль</div>
    <div class="tab" onclick="switchTab(2)"><i class="fas fa-clock"></i> История</div>
  </div>
  <div id="login-screen" class="container"></div>
  <div id="app-screen" class="hidden"></div>
</div>

<script>
  // ========== SUPABASE НАСТРОЙКИ ==========
  const SUPABASE_URL = 'https://iisgrrjkxryteofebutu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpc2dycmpreHJ5dGVvZmVidXR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzM1MjMsImV4cCI6MjA5MTQwOTUyM30.RfdjJuUvpqY0ML0SKcxfZs4PyjUo0zm5oA0i6OntCvU';
  
  // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
  let currentUser = null;
  let currentPhone = '';
  let currentBonus = 0;
  let currentSpent = 0;
  let currentNickname = '';
  let currentAvatar = '☕';
  let currentPhoto = null;
  let transactions = [];
  let currentTab = 0;

  const countryCodes = {
    '🇷🇺 Россия': '+7',
    '🇺🇦 Украина': '+380',
    '🇧🇾 Беларусь': '+375',
    '🇰🇿 Казахстан': '+7',
    '🇪🇺 Европа': '+3'
  };

  // ========== ФУНКЦИИ РАБОТЫ С SUPABASE ==========
  async function querySupabase(sql, params = []) {
    // Для простоты используем REST API
    const endpoint = `${SUPABASE_URL}/rest/v1/rpc/exec_sql`;
    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({ query: sql, params: params })
      });
      return await response.json();
    } catch (error) {
      console.error('Supabase error:', error);
      return null;
    }
  }

  async function loadUserFromCloud(phone) {
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/users?phone=eq.${encodeURIComponent(phone)}&select=*`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      const data = await response.json();
      if (data && data.length > 0) {
        return data[0];
      }
      return null;
    } catch (error) {
      console.error('Error loading user:', error);
      return null;
    }
  }

  async function saveUserToCloud(user) {
    try {
      const existing = await loadUserFromCloud(user.phone);
      if (existing) {
        // Обновляем
        await fetch(`${SUPABASE_URL}/rest/v1/users?phone=eq.${encodeURIComponent(user.phone)}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify({
            bonus: user.bonus,
            spent: user.spent,
            nickname: user.nickname,
            avatar: user.avatar,
            visits: user.visits
          })
        });
      } else {
        // Создаём
        await fetch(`${SUPABASE_URL}/rest/v1/users`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify({
            phone: user.phone,
            name: user.name,
            bonus: user.bonus,
            spent: user.spent,
            nickname: user.nickname,
            avatar: user.avatar,
            visits: user.visits
          })
        });
      }
    } catch (error) {
      console.error('Error saving user:', error);
    }
  }

  async function addTransactionToCloud(phone, amount, type, description) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({
          phone: phone,
          amount: amount,
          type: type,
          description: description
        })
      });
    } catch (error) {
      console.error('Error saving transaction:', error);
    }
  }

  async function loadTransactionsFromCloud(phone) {
    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/transactions?phone=eq.${encodeURIComponent(phone)}&order=created_at.desc&limit=50`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      const data = await response.json();
      return data || [];
    } catch (error) {
      console.error('Error loading transactions:', error);
      return [];
    }
  }

  // ========== ОСНОВНЫЕ ФУНКЦИИ ==========
  function normalizePhone(raw, countryCode) {
    let digits = raw.replace(/\D/g, '');
    if (countryCode === '+7' && digits.length === 10) return '+7' + digits;
    if (countryCode === '+7' && digits.length === 11 && digits.startsWith('7')) return '+' + digits;
    if (countryCode === '+7' && digits.length === 11 && digits.startsWith('8')) return '+7' + digits.substring(1);
    if (countryCode === '+380' && digits.length === 9) return '+380' + digits;
    if (countryCode === '+375' && digits.length === 9) return '+375' + digits;
    if (digits.length >= 10) return countryCode + digits;
    return raw;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    let d = new Date(dateStr);
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} ${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
  }

  function getLevel() {
    if (currentSpent >= 10000) return 'Платиновый';
    if (currentSpent >= 5000) return 'Золотой';
    if (currentSpent >= 2000) return 'Серебряный';
    return 'Бронзовый';
  }

  function getLevelColor() {
    if (currentSpent >= 10000) return '#B0BEC5';
    if (currentSpent >= 5000) return '#FFD700';
    if (currentSpent >= 2000) return '#C0C0C0';
    return '#CD7F32';
  }

  async function addPurchase(amount, category) {
    if (amount <= 0) return;
    let isDrink = (category === 'coffee' || category === 'bakery');
    let bonusEarned = isDrink ? Math.floor(amount * 0.05) : 0;
    let categoryName = category === 'coffee' ? 'Кофе' : category === 'bakery' ? 'Фирменный напиток' : 'Другое';
    let icon = category === 'coffee' ? '☕' : category === 'bakery' ? '🥐' : '🍽️';
    
    currentBonus += bonusEarned;
    currentSpent += amount;
    
    // Сохраняем в облако
    await saveUserToCloud({
      phone: currentPhone,
      name: currentUser?.name || 'Гость',
      bonus: currentBonus,
      spent: currentSpent,
      nickname: currentNickname,
      avatar: currentAvatar,
      visits: (await loadUserFromCloud(currentPhone))?.visits + 1 || 1
    });
    await addTransactionToCloud(currentPhone, bonusEarned, 'add', `${icon} ${categoryName}: ${amount}₽ → +${bonusEarned} бонусов`);
    
    // Обновляем локальные транзакции
    transactions.unshift({ 
      description: `${icon} ${categoryName}: ${amount}₽ → +${bonusEarned} бонусов`, 
      amount: bonusEarned, 
      type: 'add', 
      created_at: new Date().toISOString() 
    });
    
    renderCurrentTab();
    alert(bonusEarned > 0 ? `+${bonusEarned} бонусов (5% от ${amount}₽)` : `⚠️ Бонусы только на кофе и фирменные напитки`);
  }

  async function redeemBonus(amount) {
    if (currentBonus >= amount) {
      currentBonus -= amount;
      
      await saveUserToCloud({
        phone: currentPhone,
        name: currentUser?.name || 'Гость',
        bonus: currentBonus,
        spent: currentSpent,
        nickname: currentNickname,
        avatar: currentAvatar,
        visits: (await loadUserFromCloud(currentPhone))?.visits || 1
      });
      await addTransactionToCloud(currentPhone, -amount, 'remove', `Списано ${amount} бонусов`);
      
      transactions.unshift({ 
        description: `Списано ${amount} бонусов`, 
        amount: -amount, 
        type: 'remove', 
        created_at: new Date().toISOString() 
      });
      
      renderCurrentTab();
    } else {
      alert(`Недостаточно бонусов! У вас ${currentBonus}, нужно ${amount}`);
    }
  }

  async function login() {
    let countrySelect = document.getElementById('country-select');
    let countryCode = countrySelect.options[countrySelect.selectedIndex]?.value || '+7';
    let rawNumber = document.getElementById('phone-number').value.trim();
    if (!rawNumber) { alert('Введите номер телефона'); return; }
    
    let phone = normalizePhone(rawNumber, countryCode);
    if (!phone.startsWith('+')) { alert('Неверный формат номера'); return; }
    
    currentPhone = phone;
    
    // Загружаем из облака
    let userData = await loadUserFromCloud(phone);
    
    if (userData) {
      currentUser = { name: userData.name };
      currentBonus = userData.bonus;
      currentSpent = userData.spent;
      currentNickname = userData.nickname || userData.name;
      currentAvatar = userData.avatar || '☕';
      currentPhoto = userData.photo || null;
      // Загружаем транзакции
      let cloudTransactions = await loadTransactionsFromCloud(phone);
      transactions = cloudTransactions.map(t => ({
        description: t.description,
        amount: t.amount,
        type: t.type === 'add' ? 'add' : t.type === 'remove' ? 'remove' : 'none',
        created_at: t.created_at
      }));
    } else {
      // Новый пользователь
      currentUser = { name: 'Новый гость' };
      currentBonus = 50;
      currentSpent = 0;
      currentNickname = 'Гость';
      currentAvatar = '☕';
      currentPhoto = null;
      transactions = [];
      
      await saveUserToCloud({
        phone: phone,
        name: 'Новый гость',
        bonus: 50,
        spent: 0,
        nickname: 'Гость',
        avatar: '☕',
        visits: 1
      });
    }
    
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('tabs').style.display = 'flex';
    renderCurrentTab();
  }

  function logout() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
    document.getElementById('tabs').style.display = 'none';
    renderLoginScreen();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((el, i) => {
      if (i === tab) el.classList.add('active');
      else el.classList.remove('active');
    });
    renderCurrentTab();
  }

  function renderCurrentTab() {
    if (currentTab === 0) renderPurchaseTab();
    else if (currentTab === 1) renderProfileTab();
    else renderHistoryTab();
  }

  function renderPurchaseTab() {
    let html = `
      <div class="card balance-card">
        <div class="balance-label">Мои бонусы</div>
        <div class="balance-amount">${currentBonus}</div>
        <div class="balance-label">Всего потрачено: ${currentSpent}₽</div>
        <div class="balance-sub">Уровень: ${getLevel()}</div>
      </div>
      
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="font-size:18px; font-weight:600;">Симуляция покупки</h3>
          <span class="promo-badge">5% бонусов</span>
        </div>
        <p class="text-muted mb-2">Бонусы начисляются только на кофе и фирменные напитки</p>
        <div class="row">
          <button class="btn-outline" onclick="showAmountPicker('coffee')"><i class="fas fa-coffee"></i> Кофе</button>
          <button class="btn-outline" onclick="showAmountPicker('bakery')"><i class="fas fa-croissant"></i> Фирменный</button>
          <button class="btn-outline" onclick="showAmountPicker('other')"><i class="fas fa-utensils"></i> Другое</button>
        </div>
      </div>
      
      <div class="card">
        <h3 style="margin-bottom:16px; font-size:18px; font-weight:600;">Списание бонусов</h3>
        <div class="row">
          <button class="btn-secondary" onclick="redeemBonus(50)"><i class="fas fa-minus-circle"></i> Списать 50</button>
          <button class="btn-secondary" onclick="redeemBonus(100)"><i class="fas fa-minus-circle"></i> Списать 100</button>
        </div>
      </div>
    `;
    document.getElementById('app-screen').innerHTML = `<div class="container">${html}</div>`;
  }

  function showAmountPicker(category) {
    let categoryName = category === 'coffee' ? 'Кофе' : category === 'bakery' ? 'Фирменный напиток' : 'Другое';
    let icon = category === 'coffee' ? '☕' : category === 'bakery' ? '🥐' : '🍽️';
    let amounts = [200, 500, 1000, 1500];
    let buttons = amounts.map(a => `<button class="btn-outline" onclick="addPurchase(${a}, '${category}')">${a}₽</button>`).join('');
    let html = `
      <div class="card" style="text-align:center;">
        <h3>${icon} ${categoryName}</h3>
        <p class="text-muted mb-2">Выберите сумму чека</p>
        <div class="row" style="flex-wrap:wrap; justify-content:center;">${buttons}</div>
        <div class="row" style="margin-top:16px;">
          <input type="number" id="custom-amount-${category}" placeholder="Своя сумма" class="phone-number">
          <button class="btn-outline" onclick="addPurchase(parseInt(document.getElementById('custom-amount-${category}').value)||0,'${category}')">Начислить</button>
        </div>
        <button class="btn-secondary mt-4" onclick="renderCurrentTab()"><i class="fas fa-arrow-left"></i> Назад</button>
      </div>
    `;
    document.getElementById('app-screen').innerHTML = `<div class="container">${html}</div>`;
  }

  function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        currentPhoto = e.target.result;
        saveUserToCloud({
          phone: currentPhone,
          name: currentUser?.name || 'Гость',
          bonus: currentBonus,
          spent: currentSpent,
          nickname: currentNickname,
          avatar: currentAvatar,
          photo: currentPhoto,
          visits: 1
        });
        renderProfileTab();
      };
      reader.readAsDataURL(file);
    }
  }

  function renderProfileTab() {
    let avatars = ['☕', '👤', '🌟', '⭐', '🔥', '💪', '🎯', '🏆', '👑', '🦁', '🐯', '🐼', '🍕', '🎸', '⚡', '💎'];
    let avatarsHtml = avatars.map(a => `<div class="avatar-option ${currentAvatar === a ? 'selected' : ''}" onclick="selectAvatar('${a}')">${a}</div>`).join('');
    
    let avatarHtml = currentPhoto 
      ? `<img src="${currentPhoto}" alt="Фото">` 
      : `<span style="font-size:44px;">${currentAvatar}</span>`;
    
    let html = `
      <div class="container">
        <div class="card">
          <div class="avatar-section">
            <div class="avatar-large">${avatarHtml}</div>
            <input type="file" id="photo-upload" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
            <button class="upload-photo-btn" onclick="document.getElementById('photo-upload').click()" style="background:#F0F0F0; color:#1A1A1A;"><i class="fas fa-camera"></i> Загрузить фото</button>
          </div>
          <div class="text-center">
            <h2>${currentNickname}</h2>
            <p class="text-muted">${currentPhone}</p>
            <div style="display:inline-block; background:${getLevelColor()}20; padding:6px 16px; border-radius:40px; margin-top:8px;">
              <span style="color:${getLevelColor()};">${getLevel()}</span>
            </div>
          </div>
        </div>
        
        <div class="card text-center">
          <h3 style="margin-bottom:12px;">Ваш QR-код</h3>
          <p class="text-muted mb-2">Покажите кассиру для начисления бонусов</p>
          <div class="qr-container">
            <div class="qr-code">
              <i class="fas fa-qrcode" style="font-size:64px; color:#B8860B;"></i>
              <div style="font-size:12px; margin-top:8px;">${currentPhone}</div>
              <div style="font-size:10px; color:#999;">ID: ${currentPhone.slice(-6)}</div>
            </div>
          </div>
        </div>
        
        <div class="card">
          <h3 style="margin-bottom:16px;">Редактировать профиль</h3>
          <input type="text" id="nickname-input" placeholder="Никнейм" value="${currentNickname}" class="phone-number" style="margin-bottom:12px;">
          <div class="avatar-selector">${avatarsHtml}</div>
          <button onclick="saveProfile()"><i class="fas fa-save"></i> Сохранить</button>
        </div>
        
        <div class="card">
          <h3 style="margin-bottom:16px;">Статистика</h3>
          <div class="stat-row"><span><i class="fas fa-gem"></i> Всего бонусов</span><strong>${currentBonus}</strong></div>
          <div class="stat-row"><span><i class="fas fa-shopping-bag"></i> Всего потрачено</span><strong>${currentSpent}₽</strong></div>
          <div class="stat-row"><span><i class="fas fa-chart-line"></i> Уровень</span><strong>${getLevel()}</strong></div>
        </div>
        
        <div class="card text-center">
          <h3 style="margin-bottom:12px;">Мы в соцсетях</h3>
          <a href="https://vk.com/tijgerbol" target="_blank" style="color:#B8860B; text-decoration:none;"><i class="fab fa-vk"></i> ВКонтакте</a>
        </div>
      </div>
    `;
    document.getElementById('app-screen').innerHTML = html;
  }

  function renderHistoryTab() {
    if (transactions.length === 0) {
      document.getElementById('app-screen').innerHTML = `<div class="container"><div class="card text-center">Нет операций</div></div>`;
      return;
    }
    let historyHtml = '<div class="container"><div class="card">';
    transactions.forEach(t => {
      let iconClass = t.type === 'add' ? 'add' : t.type === 'remove' ? 'remove' : 'none';
      let iconSymbol = t.type === 'add' ? '+' : t.type === 'remove' ? '−' : 'ℹ️';
      historyHtml += `
        <div class="history-item">
          <div class="history-icon ${iconClass}">${iconSymbol}</div>
          <div class="history-text">
            <div>${t.description}</div>
            <div class="history-date">${formatDate(t.created_at)}</div>
          </div>
        </div>
      `;
    });
    historyHtml += '</div></div>';
    document.getElementById('app-screen').innerHTML = historyHtml;
  }

  function selectAvatar(avatar) { currentAvatar = avatar; renderProfileTab(); }
  
  async function saveProfile() {
    let newNickname = document.getElementById('nickname-input').value.trim();
    if (newNickname) currentNickname = newNickname;
    await saveUserToCloud({
      phone: currentPhone,
      name: currentUser?.name || 'Гость',
      bonus: currentBonus,
      spent: currentSpent,
      nickname: currentNickname,
      avatar: currentAvatar,
      photo: currentPhoto,
      visits: 1
    });
    renderProfileTab();
  }

  function renderLoginScreen() {
    let countryOptions = Object.entries(countryCodes).map(([name, code]) => `<option value="${code}">${name} (${code})</option>`).join('');
    let loginHtml = `
      <div class="card" style="text-align:center; margin-top:40px;">
        <div style="font-size:56px; margin-bottom:8px;">☕</div>
        <h1 style="font-size:32px; letter-spacing:-1px;">Tijgerbol</h1>
        <p class="text-muted" style="margin-bottom:24px;">Бонусная программа кофейни</p>
        <div class="phone-input-group">
          <select id="country-select" class="country-select">
            ${countryOptions}
          </select>
          <input type="tel" id="phone-number" class="phone-number" placeholder="912 345 67 89">
        </div>
        <button onclick="login()" style="margin-top:16px;"><i class="fas fa-arrow-right"></i> Войти / Зарегистрироваться</button>
        <p class="text-muted" style="margin-top:20px; font-size:12px;">
          🧪 Тестовые: +79123456789 (450 бонусов)<br>
          ☕ Бонусы только на кофе и фирменные напитки
        </p>
      </div>
    `;
    document.getElementById('login-screen').innerHTML = loginHtml;
  }

  // Запуск приложения
  renderLoginScreen();
</script>
</body>
</html>
