<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tijgerbol</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #f5f5f5; }
    .coffee { font-size: 64px; }
    h1 { color: #6D4C41; }
    button { background: #6D4C41; color: white; border: none; padding: 12px 24px; border-radius: 8px; margin: 10px; cursor: pointer; }
    input { padding: 12px; margin: 10px; border-radius: 8px; border: 1px solid #ccc; width: 200px; }
  </style>
</head>
<body>
  <div class="coffee">☕</div>
  <h1>Tijgerbol</h1>
  <p>Бонусная программа кофейни</p>
  
  <div>
    <input type="tel" id="phone" placeholder="+7 912 345 67 89">
    <button onclick="login()">Войти</button>
  </div>
  
  <div id="app" style="margin-top: 30px;">
    <p>Введите номер телефона для входа</p>
  </div>

  <script>
    const users = {
      '+79123456789': { name: 'Алексей', bonus: 450, avatar: '☕' },
      '+79991234567': { name: 'Мария', bonus: 280, avatar: '🎀' }
    };
    
    function login() {
      let phone = document.getElementById('phone').value.trim();
      let user = users[phone];
      
      if (user) {
        document.getElementById('app').innerHTML = `
          <div style="background: white; padding: 20px; border-radius: 16px; max-width: 300px; margin: 0 auto;">
            <div style="font-size: 48px;">${user.avatar}</div>
            <h2>${user.name}</h2>
            <p>Бонусов: <strong>${user.bonus}</strong></p>
            <button onclick="addBonus()">+50 бонусов</button>
            <button onclick="redeemBonus()">Списать 50</button>
            <p style="margin-top: 20px;"><a href="#" onclick="logout()">Выйти</a></p>
          </div>
        `;
      } else if (phone.startsWith('+7') && phone.length === 12) {
        document.getElementById('app').innerHTML = `
          <div style="background: white; padding: 20px; border-radius: 16px; max-width: 300px; margin: 0 auto;">
            <div style="font-size: 48px;">🆕</div>
            <h2>Новый гость</h2>
            <p>Приветственные бонусы: <strong>50</strong></p>
            <button onclick="addBonus()">+50 бонусов</button>
            <p style="margin-top: 20px;"><a href="#" onclick="logout()">Выйти</a></p>
          </div>
        `;
      } else {
        alert('Неверный формат номера. Используйте +7XXXXXXXXXX');
      }
    }
    
    function addBonus() {
      alert('+50 бонусов (тестовая версия)');
    }
    
    function redeemBonus() {
      alert('Списано 50 бонусов (тестовая версия)');
    }
    
    function logout() {
      location.reload();
    }
  </script>
</body>
</html>
